services:
  web:
    build: .
    restart: unless-stopped
    environment:
      VALKEY_URL: redis://valkey:6379
      YTDLP_BIN: yt-dlp
    ports:
      - "3000:3000"
    depends_on:
      - valkey

  valkey:
    image: valkey/valkey:8.1
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "valkey-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 10
